name: Automated Modelling Refresh

on:
  schedule:
    # 6:00 AM UTC every day
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Get current datetime
        run: echo "NOW=$(date +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_ENV

      - name: Refresh Projections
        working-directory: ./source
        run: |
          goose refresh automated-refresh

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add source/honk/projections/*
          git commit -m "chore: Football-Honk Projection Update - ${{ env.NOW }} [skip ci]"
          git push